    const colors = {"Auth":"#F59E0B","Payments/Orders":"#10B981","AI Features":"#8B5CF6","Seller/Admin":"#EF4444","Storefront":"#3B82F6","Shared/Utils":"#6B7280","Database":"#06B6D4","Core/Other":"#94A3B8"};

    const legendContainer = document.getElementById('legend');
    Object.keys(colors).forEach(key => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<div class="legend-color" style="background: ${colors[key]}"></div> ${key}`;
      legendContainer.appendChild(item);
    });
    
    const orphanItem = document.createElement('div');
    orphanItem.className = 'legend-item';
    orphanItem.innerHTML = `<div class="legend-color" style="background: #1E293B; border: 1px solid #EF4444; border-radius: 0;"></div> Orphaned`;
    legendContainer.appendChild(orphanItem);

    const nodes = new vis.DataSet(nodesData);
    const edges = new vis.DataSet(edgesData);

    const container = document.getElementById('mynetwork');
    const data = { nodes: nodes, edges: edges };
    const options = {
      nodes: {
        font: { color: '#F8FAFC', size: 14, face: 'system-ui' },
        borderWidth: 2,
        size: 20,
        shadow: { enabled: true, color: 'rgba(0,0,0,0.5)', size: 5, x: 2, y: 2 }
      },
      edges: {
        color: { color: '#334155', highlight: '#94A3B8', hover: '#64748B' },
        arrows: { to: { enabled: true, scaleFactor: 0.6 } },
        smooth: { type: 'continuous' },
        width: 1.5
      },
      physics: {
        forceAtlas2Based: {
          gravitationalConstant: -70,
          centralGravity: 0.015,
          springLength: 120,
          springConstant: 0.08
        },
        maxVelocity: 50,
        solver: 'forceAtlas2Based',
        timestep: 0.35,
        stabilization: { iterations: 150 }
      },
      interaction: {
        hover: true,
        tooltipDelay: 100,
        zoomView: true
      },
      layout: {
        improvedLayout: true
      }
    };

    const network = new vis.Network(container, data, options);

    const sidePanel = document.getElementById('side-panel');
    const panelTitle = document.getElementById('panel-title');
    const panelFilepath = document.getElementById('panel-filepath');
    const panelContent = document.getElementById('panel-content');
    const panelBadge = document.getElementById('panel-badge');

    function closePanel() {
      sidePanel.classList.remove('open');
      network.unselectAll();
    }

    network.on("click", function (params) {
      if (params.nodes.length > 0) {
        const nodeId = params.nodes[0];
        const node = nodes.get(nodeId);
        panelTitle.innerText = node.label;
        panelFilepath.innerText = node.id;
        panelBadge.innerHTML = `<span class="badge" style="background-color: ${colors[node.featureArea]}">${node.featureArea}</span>`;
        panelContent.innerHTML = node.explanation;
        sidePanel.classList.add('open');
      } else {
        closePanel();
      }
    });

    document.getElementById('searchInput').addEventListener('input', function(e) {
      const term = e.target.value.toLowerCase();
      if (!term) {
        nodes.forEach(n => nodes.update({id: n.id, hidden: false}));
        edges.forEach(edge => edges.update({id: edge.id, hidden: false}));
        return;
      }

      const matchedNodes = new Set();
      nodes.forEach(n => {
        if (n.id.toLowerCase().includes(term) || n.featureArea.toLowerCase().includes(term)) {
          matchedNodes.add(n.id);
        }
      });

      nodes.forEach(n => {
        if (matchedNodes.has(n.id)) {
          nodes.update({id: n.id, hidden: false});
        } else {
          nodes.update({id: n.id, hidden: true});
        }
      });
      
      edges.forEach(edge => {
        if (matchedNodes.has(edge.from) || matchedNodes.has(edge.to)) {
           edges.update({id: edge.id, hidden: false});
           nodes.update({id: edge.from, hidden: false});
           nodes.update({id: edge.to, hidden: false});
        } else {
           edges.update({id: edge.id, hidden: true});
        }
      });
    });
